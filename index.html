<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivia — ¿Sabes cómo protegerte en línea? | El Espectador</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .trivia-wrap {
      width: 100%;
      max-width: 640px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #c8102e;
    }

    .logo-mark {
      background: #c8102e;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .header-title {
      font-size: 15px;
      color: #666;
    }

    .progress-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .progress-bar-wrap {
      background: #e5e5e5;
      border-radius: 99px;
      height: 6px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .progress-bar {
      background: #c8102e;
      height: 6px;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e5e5;
      border: 0.5px solid #ccc;
      transition: background 0.3s;
    }

    .dot.done { background: #c8102e; border-color: #c8102e; }
    .dot.active { background: #c8102e; border-color: #c8102e; opacity: 0.4; }

    .card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .question-num {
      font-size: 12px;
      color: #c8102e;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .question-text {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      background: #f5f5f3;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      color: #1a1a1a;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: inherit;
    }

    .option-btn:hover:not(:disabled) {
      background: #ebebeb;
      border-color: #aaa;
    }

    .option-btn.correct {
      background: #EAF3DE;
      border-color: #639922;
      color: #27500A;
    }

    .option-btn.wrong {
      background: #FCEBEB;
      border-color: #A32D2D;
      color: #501313;
    }

    .option-btn:disabled { cursor: default; }

    .letter {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 0.5px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .option-btn.correct .letter { background: #639922; color: #fff; border-color: #639922; }
    .option-btn.wrong .letter   { background: #A32D2D; color: #fff; border-color: #A32D2D; }

    .feedback {
      margin-top: 1rem;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    .feedback.correct { background: #EAF3DE; color: #27500A; border-left: 3px solid #639922; }
    .feedback.wrong   { background: #FCEBEB; color: #501313;  border-left: 3px solid #A32D2D; }

    .next-btn {
      background: #c8102e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0;
      display: none;
      width: 100%;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    .next-btn:hover { opacity: 0.88; }

    /* Score card */
    .score-card { display: none; }

    .score-inner {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #FCEBEB;
      color: #A32D2D;
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .score-big {
      font-size: 52px;
      font-weight: 500;
      color: #c8102e;
      line-height: 1;
      margin-bottom: 6px;
    }

    .score-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 1.25rem;
    }

    .score-msg {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .score-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .restart-btn {
      background: #c8102e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 32px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    .restart-btn:hover { opacity: 0.88; }

    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      .question-text { font-size: 15px; }
      .option-btn { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="trivia-wrap" id="top">
  <div class="header">
    <div class="logo-mark">El Espectador</div>
    <div class="header-title">Trivia — ¿Sabes cómo protegerte en línea?</div>
  </div>

  <div id="quiz-section">
    <p class="progress-label" id="prog-label">Pregunta 1 de 5</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:20%"></div></div>
    <div class="dots" id="dots"></div>

    <div class="card">
      <div class="question-num" id="q-num">Pregunta 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <button class="next-btn" id="next-btn">Siguiente pregunta →</button>
  </div>

  <div class="score-card" id="score-card">
    <div class="score-inner">
      <div class="stat-pill"><i class="ti ti-shield"></i> Resultado final</div>
      <div class="score-big" id="score-num">0/5</div>
      <div class="score-label">respuestas correctas</div>
      <div class="score-msg" id="score-msg"></div>
      <div class="score-sub" id="score-sub"></div>
      <button class="restart-btn" onclick="restart()">Volver a intentar</button>
    </div>
  </div>
</div>

<script>
  const questions = [
    {
      q: "Recibes un mensaje de WhatsApp de tu banco pidiéndote que hagas clic en un enlace urgente para evitar que bloqueen tu cuenta. ¿Qué debes hacer?",
      options: [
        "Hacer clic rápido para evitar el bloqueo",
        "Reenviar el mensaje a un familiar para que lo revise",
        "No hacer clic y comunicarte con el banco por sus canales oficiales",
        "Responder el mensaje pidiendo más información"
      ],
      answer: 2,
      feedback: "Los ciberatacantes usan la urgencia para que actúes sin pensar. Ante cualquier mensaje sospechoso, verifica siempre por otro canal —llamada directa al banco o la app oficial— antes de hacer clic en cualquier enlace."
    },
    {
      q: "Vas a crear una contraseña para tu cuenta bancaria. ¿Cuál de estas prácticas es la más segura?",
      options: [
        "Usar la misma contraseña de tu correo para recordarla fácilmente",
        "Usar una contraseña única y robusta, diferente para cada cuenta",
        "Anotar la contraseña en un papel guardado en tu billetera",
        "Usar tu fecha de nacimiento combinada con tu nombre"
      ],
      answer: 1,
      feedback: "Cada cuenta debe tener una contraseña distinta y difícil de adivinar. Si reutilizas contraseñas, basta con que una cuenta sea hackeada para que todas queden expuestas. Cámbialas periódicamente y nunca las compartas."
    },
    {
      q: "Le prestas tu celular a tu hijo pequeño para que juegue. ¿Qué medida reduce mejor el riesgo de exponer tu información?",
      options: [
        "Cerrar solo la app del banco antes de prestarlo",
        "Configurar un usuario o perfil separado para el menor en el dispositivo",
        "Pedirle que no abra nada importante",
        "Activar el modo avión mientras lo usa"
      ],
      answer: 1,
      feedback: "Crear un perfil de usuario independiente para el menor limita su acceso a tus apps, archivos y cuentas. Así, aunque descargue algo sin querer, tu información personal permanece protegida."
    },
    {
      q: "Terminas de revisar tu cuenta bancaria desde el celular y pasas a otra app. ¿Qué hábito deberías tener siempre?",
      options: [
        "Bajar el brillo de la pantalla para que nadie vea",
        "Cerrar la sesión de la aplicación antes de salir de ella",
        "Poner el celular boca abajo",
        "Cambiar al modo no molestar"
      ],
      answer: 1,
      feedback: "El 86% de los colombianos deja las sesiones abiertas en el móvil. Cerrar la sesión cada vez que terminas es uno de los hábitos más sencillos y efectivos para proteger tu información."
    },
    {
      q: "Recibes una llamada con la voz de un familiar pidiéndote dinero urgente. ¿Cuál es la mejor reacción?",
      options: [
        "Transferir de inmediato porque reconoces la voz",
        "Colgar y llamar directamente al número real de ese familiar para verificar",
        "Pedir que te expliquen mejor la situación antes de transferir",
        "Consultar con otro familiar por chat antes de responder"
      ],
      answer: 1,
      feedback: "Los deepfakes de voz pueden imitar a cualquier persona de forma convincente. Ante una solicitud urgente de dinero por llamada, siempre cuelga y marca directamente al número que ya tienes guardado de ese familiar."
    }
  ];

  let current = 0, score = 0, answered = false;

  function buildDots() {
    const c = document.getElementById('dots');
    c.innerHTML = '';
    for (let i = 0; i < questions.length; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
      c.appendChild(d);
    }
  }

  function loadQuestion() {
    answered = false;
    const q = questions[current];
    document.getElementById('q-num').textContent = 'Pregunta ' + (current + 1);
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('prog-label').textContent = 'Pregunta ' + (current + 1) + ' de 5';
    document.getElementById('progress-bar').style.width = ((current + 1) / 5 * 100) + '%';
    buildDots();

    const list = document.getElementById('options-list');
    list.innerHTML = '';
    ['A', 'B', 'C', 'D'].forEach((l, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = '<span class="letter">' + l + '</span>' + q.options[i];
      btn.onclick = () => selectAnswer(i);
      list.appendChild(btn);
    });

    const fb = document.getElementById('feedback');
    fb.style.display = 'none';
    fb.className = 'feedback';
    document.getElementById('next-btn').style.display = 'none';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    const q = questions[current];
    const btns = document.querySelectorAll('.option-btn');
    const fb = document.getElementById('feedback');

    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add('correct');
      if (i === idx && i !== q.answer) btn.classList.add('wrong');
    });

    if (idx === q.answer) {
      score++;
      fb.className = 'feedback correct';
      fb.innerHTML = '<strong>¡Correcto!</strong> ' + q.feedback;
    } else {
      fb.className = 'feedback wrong';
      fb.innerHTML = '<strong>Incorrecto.</strong> ' + q.feedback;
    }
    fb.style.display = 'block';

    const nb = document.getElementById('next-btn');
    nb.style.display = 'block';
    nb.textContent = current < 4 ? 'Siguiente pregunta →' : 'Ver mi resultado';
  }

  document.getElementById('next-btn').onclick = function () {
    current++;
    if (current < 5) {
      loadQuestion();
    } else {
      showResult();
    }
    document.getElementById('top').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  function showResult() {
    document.getElementById('quiz-section').style.display = 'none';
    document.getElementById('score-card').style.display = 'block';
    document.getElementById('score-num').textContent = score + '/5';

    let msg, sub;
    if (score === 5) {
      msg = '¡Navegas con cabeza!';
      sub = 'Conoces las acciones clave para protegerte. Comparte esta trivia con tu familia: los hábitos digitales seguros se construyen juntos.';
    } else if (score >= 3) {
      msg = 'Vas por buen camino, pero hay hábitos por reforzar.';
      sub = 'Ya tienes conciencia del riesgo. El reto es convertir esas buenas prácticas en rutina: cerrar sesiones, verificar antes de hacer clic y usar contraseñas distintas para cada cuenta.';
    } else {
      msg = 'Tu seguridad digital necesita atención.';
      sub = 'El primer paso es informarse. Revisa tus contraseñas, activa la verificación en dos pasos y desconfía de mensajes urgentes que pidan datos o dinero, sin importar de quién parezcan venir.';
    }
    document.getElementById('score-msg').textContent = msg;
    document.getElementById('score-sub').textContent = sub;
  }

  function restart() {
    current = 0;
    score = 0;
    document.getElementById('score-card').style.display = 'none';
    document.getElementById('quiz-section').style.display = 'block';
    loadQuestion();
    document.getElementById('top').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  loadQuestion();
</script>
</body>
</html>
